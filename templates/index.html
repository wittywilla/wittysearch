<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WittySearch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="home-body">
    
    <div class="top-right-nav">
        {% if show_server %}
        <a href="https://wittywilla.xyz" class="purple-btn">
            Visit WittyWilla's Project Server
        </a>
        {% endif %}
        
        {% if show_github %}
        <a href="https://github.com/wittywilla/wittysearch" class="github-btn">
            <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
                <path fill="currentColor" d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.46-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
            </svg>
            <span class="github-text">Visit This Project's Github</span>
        </a>
        {% endif %}
    </div>

    <div class="center-container">
        <h1 class="logo">
            <span class="blue">W</span><span class="red">i</span><span class="yellow">t</span><span class="blue">t</span><span class="green">y</span><span class="red">Search</span>
        </h1>
        <form action="/search" method="GET">
            <input type="text" name="q" class="search-box" autofocus placeholder="Search files (e.g., 'taxes filetype:pdf')">
            <br>
            <div class="btn-group">
                <button type="submit" class="search-btn">Witty Search</button>
                <button type="button" class="search-btn">I'm Feeling Lucky</button>
            </div>
        </form>
    </div>
</body>
</html>
